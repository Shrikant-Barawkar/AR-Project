<!DOCTYPE html>
<html>
<head>
    <title>Manual Explode AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        .ui-panel { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 10; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; }
    </style>
</head>
<body>

    <model-viewer id="machine" src="RoboHandLab.glb" ar camera-controls style="width: 100%; height: 600px;">
        <div class="ui-panel">
            <button onclick="explode()">💥 EXPLODE</button>
            <button onclick="assemble()" style="background:#28a745;">🛠 ASSEMBLE</button>
        </div>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#machine');

        // This function runs when the model is fully loaded
        modelViewer.addEventListener('load', () => {
            const scene = modelViewer.toObject3D(); 
            console.log("Model Loaded. Parts found:", scene);
        });

        function explode() {
            // We tell the model to shift parts outward
            // Note: You need the EXACT name of the parts from your CAD software
            const parts = modelViewer.toObject3D().children[0].children;
            
            parts.forEach((part, index) => {
                // Move each part 2 units away from the center
                part.position.y += (index * 0.5); 
                part.position.x += (index * 0.2);
            });
        }

        function assemble() {
            const parts = modelViewer.toObject3D().children[0].children;
            parts.forEach((part) => {
                // Reset everything to the center (0,0,0)
                part.position.set(0, 0, 0);
            });
        }
    </script>
</body>
</html>
